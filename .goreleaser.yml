version: 2

builds:
  - main: .
    binary: skaledata
    ldflags:
      - -s -w
      - -X github.com/skaledata/cli/cmd.Version={{ .Version }}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    name_template: "skaledata_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

brews:
  - repository:
      owner: skaledata
      name: homebrew-tap
    name: skaledata
    homepage: "https://skaledata.com"
    description: "SkaleData CLI — manage clusters, apps, and deployments"
    license: "MIT"
    install: |
      bin.install "skaledata"
    test: |
      system "#{bin}/skaledata", "version"

release:
  github:
    owner: skaledata
    name: cli
